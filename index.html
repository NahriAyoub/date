<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tomorrow Planner 💖</title>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<style>

/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  height: 100vh;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffd6e7 0%, #c7f9ff 50%, #fff3b0 100%);
  background-size: 400% 400%;
  animation: bgShift 8s ease infinite;
}

@keyframes bgShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ── FLOATING PARTICLES ── */
#particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.particle {
  position: absolute;
  font-size: 22px;
  opacity: 0;
  animation: floatUp linear infinite;
  user-select: none;
}

@keyframes floatUp {
  0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
  10%  { opacity: 0.7; }
  90%  { opacity: 0.5; }
  100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
}

/* ── APP WRAPPER ── */
#app {
  position: relative;
  z-index: 1;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 18px;
}

/* ── CARD ── */
.card {
  width: 100%;
  max-width: 440px;
  background: rgba(255, 255, 255, 0.45);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border-radius: 32px;
  padding: 28px 24px 24px;
  box-shadow: 0 30px 70px rgba(0,0,0,0.18), 0 0 0 1px rgba(255,255,255,0.6) inset;
  text-align: center;
  animation: cardPop 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes cardPop {
  from { opacity: 0; transform: scale(0.88) translateY(24px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

/* ── PROGRESS BAR ── */
.progress-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 18px;
}

.progress-bar-bg {
  flex: 1;
  height: 6px;
  background: rgba(0,0,0,0.1);
  border-radius: 99px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #ff4d8d, #ff9a3c);
  border-radius: 99px;
  transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1);
}

.progress-label {
  font-size: 11px;
  font-weight: 700;
  color: #ff4d8d;
  white-space: nowrap;
  letter-spacing: 0.5px;
}

/* ── STEP ICON ── */
.step-icon {
  font-size: 52px;
  display: block;
  margin: 0 auto 10px;
  animation: iconBounce 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  animation-delay: 0.1s;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.15));
  line-height: 1;
}

@keyframes iconBounce {
  from { opacity: 0; transform: scale(0.4) rotate(-15deg); }
  to   { opacity: 1; transform: scale(1) rotate(0deg); }
}

.step-icon.pulse {
  animation: iconBounce 0.6s cubic-bezier(0.34,1.56,0.64,1) both,
             iconPulse 2.5s ease-in-out 0.8s infinite;
}

@keyframes iconPulse {
  0%, 100% { transform: scale(1); }
  50%       { transform: scale(1.13); }
}

/* ── TITLE + TEXT ── */
.step-title {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  color: #ff4d8d;
  margin-bottom: 8px;
  animation: fadeSlide 0.4s ease both;
  animation-delay: 0.15s;
}

.text {
  font-size: 15px;
  line-height: 1.7;
  color: #333;
  white-space: pre-line;
  animation: fadeSlide 0.4s ease both;
  animation-delay: 0.2s;
}

@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── OPTIONS ── */
#options {
  margin-top: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option {
  position: relative;
  padding: 14px 16px;
  border-radius: 18px;
  background: rgba(255,255,255,0.85);
  box-shadow: 0 6px 18px rgba(0,0,0,0.1);
  cursor: pointer;
  text-align: left;
  transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  line-height: 1.55;
  font-size: 14px;
  overflow: hidden;
  animation: optionSlide 0.35s ease both;
}

.option:nth-child(1) { animation-delay: 0.25s; }
.option:nth-child(2) { animation-delay: 0.38s; }
.option:nth-child(3) { animation-delay: 0.51s; }

@keyframes optionSlide {
  from { opacity: 0; transform: translateX(-20px); }
  to   { opacity: 1; transform: translateX(0); }
}

.option:hover {
  transform: scale(1.025) translateY(-2px);
  box-shadow: 0 12px 28px rgba(255,77,141,0.2);
}

.option.selected {
  background: linear-gradient(135deg, #ff4d8d, #ff7eb3);
  color: white;
  box-shadow: 0 12px 30px rgba(255,77,141,0.4);
  transform: scale(1.025) translateY(-2px);
}

.option.selected::after {
  content: '✓';
  position: absolute;
  top: 10px;
  right: 14px;
  font-size: 18px;
  font-weight: 900;
  animation: checkPop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes checkPop {
  from { opacity: 0; transform: scale(0) rotate(-30deg); }
  to   { opacity: 1; transform: scale(1) rotate(0deg); }
}

/* ── SUMMARY ROWS ── */
.summary-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.7);
  border-radius: 14px;
  padding: 10px 14px;
  margin-top: 10px;
  font-size: 13.5px;
  color: #333;
  animation: fadeSlide 0.4s ease both;
}

.summary-row:nth-child(1) { animation-delay: 0.2s; }
.summary-row:nth-child(2) { animation-delay: 0.3s; }
.summary-row:nth-child(3) { animation-delay: 0.4s; }
.summary-row:nth-child(4) { animation-delay: 0.5s; }

.summary-icon {
  font-size: 22px;
  flex-shrink: 0;
  animation: iconSpin 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes iconSpin {
  from { transform: rotate(-180deg) scale(0); }
  to   { transform: rotate(0deg) scale(1); }
}

.summary-label {
  font-weight: 700;
  color: #ff4d8d;
  margin-right: 4px;
}

/* ── TEXTAREA ── */
textarea {
  width: 100%;
  margin-top: 14px;
  border: 2px solid rgba(255,77,141,0.25);
  border-radius: 16px;
  padding: 12px 14px;
  font-size: 14px;
  height: 80px;
  resize: none;
  background: rgba(255,255,255,0.8);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  font-family: inherit;
  color: #333;
}

textarea:focus {
  border-color: #ff4d8d;
  box-shadow: 0 0 0 3px rgba(255,77,141,0.15);
}

/* ── BUTTON ── */
.btn {
  position: relative;
  margin-top: 18px;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 22px;
  font-size: 16px;
  font-weight: 800;
  background: linear-gradient(135deg, #ff4d8d, #ff7eb3);
  color: white;
  cursor: pointer;
  overflow: hidden;
  letter-spacing: 0.5px;
  box-shadow: 0 8px 24px rgba(255,77,141,0.4);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  animation: fadeSlide 0.4s ease both;
  animation-delay: 0.45s;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(255,77,141,0.5);
}

.btn:active {
  transform: translateY(0) scale(0.97);
}

/* ripple */
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.45);
  transform: scale(0);
  animation: rippleAnim 0.55s linear;
  pointer-events: none;
}

@keyframes rippleAnim {
  to { transform: scale(4); opacity: 0; }
}

/* ── DONE CARD ── */
.done-card .step-icon {
  animation: spinPop 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes spinPop {
  from { opacity: 0; transform: scale(0) rotate(-180deg); }
  to   { opacity: 1; transform: scale(1) rotate(0deg); }
}

/* ── CONFETTI ── */
.confetti-piece {
  position: fixed;
  top: -10px;
  opacity: 0;
  border-radius: 2px;
  animation: confettiFall linear forwards;
  z-index: 9999;
  pointer-events: none;
}

@keyframes confettiFall {
  0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
  100% { opacity: 0; transform: translateY(110vh) rotate(720deg); }
}

/* ── SHAKE ERROR ── */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-8px); }
  40%, 80% { transform: translateX(8px); }
}
.shake { animation: shake 0.35s ease; }

</style>
</head>
<body>

<div id="particles"></div>
<div id="app"></div>

<script>

/* ── STATE ── */
let step     = 0;
let selected = null;
let answers  = {};

/* ── STEP DATA ── */
const steps = [
{
  icon: '🌊',
  title: null,
  text: `☀️ TOMORROW'S ADVENTURE PLANNER ☀️\n\nHey Oumaima,\nTomorrow, at exactly 09:00, your chauffeur will arrive. 🚗👨 + 👩\n\nYour mission, should you choose to accept it:\nHelp me decide how our beach day will unfold. ❤️`,
  options: null,
  start: true
},
{
  icon: '☕',
  title: 'Step 1 — Breakfast',
  text: `I pick you up at 09:00.\nBut where are we having breakfast?`,
  options: [
    `🥐 OPTION A — Air de Repos Bouznika (Paul)\n• Good coffee\n• Good pastries\n• Safe choice ✅`,
    `☕ OPTION B — New coffee shop in Casablanca\n• New place\n• New experience\n• Maybe a hidden gem 😂`
  ]
},
{
  icon: '🏖️',
  title: 'Step 2 — Beach Supplies',
  text: `We're going to the beach.\nI'm bringing snacks.\n\nBut what team are we?`,
  options: [
    `🍫 OPTION A — Sweet Team\n• Cookies\n• Chocolate\n• Juice`,
    `🥨 OPTION B — Salty Team\n• Chips\n• Sandwiches\n• Soda`,
    `🍫🥨 OPTION C — Both Teams!\n• Cookies + Chips\n• Chocolate + Sandwiches\n• Juice + Soda`
  ]
},
{
  icon: '🍔',
  title: 'Step 3 — Lunch',
  text: `After the beach... what are we doing?`,
  options: [
    `🍔 OPTION A — McDonald's\nSimple. Easy. No complications.`,
    `🍱 OPTION B — Bring your own food.\n\nThen back to Casablanca,\nTake a good shower together 🚿\nRelax a little, continue the adventure,\nAnd go out for dinner 🍣\nGood memories ✨`
  ]
},
{
  icon: '🎯',
  title: 'Final Mission',
  text: null,
  input: true
},
{
  icon: '❤️',
  title: 'Done!',
  text: null,
  done: true
}
];

/* ── PROGRESS HTML ── */
function progressHTML() {
  const total   = steps.length - 2;
  const current = Math.max(0, Math.min(step - 1, total));
  const pct     = total > 0 ? Math.round((current / total) * 100) : 0;
  if (step === 0 || step === steps.length - 1) return '';
  return `<div class="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <span class="progress-label">${current} / ${total}</span>
  </div>`;
}

/* ── SUMMARY ROWS ── */
function summaryRows() {
  const pairs = [
    { icon: '☕', label: 'Breakfast',    val: shortVal(answers.b1) },
    { icon: '🏖️', label: 'Beach Snacks', val: shortVal(answers.b2) },
    { icon: '🍔', label: 'Lunch Plan',   val: shortVal(answers.b3) }
  ];
  return pairs.map(p =>
    `<div class="summary-row">
       <span class="summary-icon">${p.icon}</span>
       <span><span class="summary-label">${p.label}:</span> ${p.val}</span>
     </div>`
  ).join('');
}

function shortVal(v) {
  if (!v || v === '-') return '—';
  return v.split('\n')[0].replace(/^[^\s]+\s/, '').replace(/OPTION [AB] — ?/, '').trim();
}

/* ── RENDER ── */
function render() {
  const s = steps[step];

  if (s.done) {
    $('#app').html(`
      <div class="card done-card">
        <span class="step-icon">${s.icon}</span>
        <div class="step-title">All set for tomorrow!</div>
        <div class="text" style="margin-bottom:4px;font-size:14px;color:#666">Here's your plan 🌊</div>
        ${summaryRows()}
        <div class="summary-row" style="animation-delay:0.5s">
          <span class="summary-icon">💬</span>
          <span><span class="summary-label">Message:</span> ${answers.msg || '—'}</span>
        </div>
        <div class="text" style="margin-top:16px;font-size:12.5px;color:#aaa">
          📸 Take a screenshot and send it to Ayoub ❤️
        </div>
      </div>`);
    launchConfetti();
    return;
  }

  if (s.input) {
    $('#app').html(`
      <div class="card">
        ${progressHTML()}
        <span class="step-icon pulse">${s.icon}</span>
        <div class="step-title">${s.title}</div>
        ${summaryRows()}
        <textarea id="msg" placeholder="Add what you need — any requests? 💬"></textarea>
        <button class="btn" id="next">Send it ❤️</button>
      </div>`);
    bindNext();
    return;
  }

  $('#app').html(`
    <div class="card">
      ${progressHTML()}
      <span class="step-icon${s.start ? ' pulse' : ''}">${s.icon}</span>
      ${s.title ? `<div class="step-title">${s.title}</div>` : ''}
      <div class="text">${encode(s.text)}</div>
      ${s.options ? '<div id="options"></div>' : ''}
      <button class="btn" id="next">${s.start ? '🚀 Start the Adventure' : 'Next ➜'}</button>
    </div>`);

  if (s.start) { bindStart(); return; }
  if (s.options) { renderOptions(s.options); }
  bindNext();
}

/* ── OPTIONS ── */
function renderOptions(options) {
  const html = options.map(o =>
    `<div class="option" data-val="${escAttr(o)}">${encode(o).replace(/\n/g, '<br>')}</div>`
  ).join('');
  $('#options').html(html);
  $('.option').off('click').on('click', function () {
    $('.option').removeClass('selected');
    $(this).addClass('selected');
    selected = $(this).data('val');
  });
}

/* ── BUTTON RIPPLE ── */
$(document).on('click', '.btn', function (e) {
  const rect = this.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  const x    = e.clientX - rect.left - size / 2;
  const y    = e.clientY - rect.top  - size / 2;
  const r    = $('<span class="ripple">').css({ width: size, height: size, left: x, top: y });
  $(this).append(r);
  setTimeout(() => r.remove(), 600);
});

/* ── FLOW BINDINGS ── */
function bindStart() {
  $('#next').off('click').on('click', function () {
    step = 1; selected = null; render();
  });
}

function bindNext() {
  $('#next').off('click').on('click', function () {
    if (step === 0) return;

    if (steps[step].input) {
      answers.msg = ($('#msg').val() || '').trim();
    } else {
      if (!selected) {
        $('.card').addClass('shake');
        setTimeout(() => $('.card').removeClass('shake'), 400);
        return;
      }
      if (step === 1) answers.b1 = selected;
      if (step === 2) answers.b2 = selected;
      if (step === 3) answers.b3 = selected;
    }

    step++; selected = null; render();
  });
}

/* ── HELPERS ── */
function encode(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function escAttr(str) {
  return str.replace(/"/g, '&quot;');
}

/* ── FLOATING PARTICLES ── */
(function () {
  const emojis = ['🌊','☀️','🌸','✨','💖','🐚','🌺','⭐','🦋','🌼'];
  const wrap   = document.getElementById('particles');

  function spawn() {
    const el  = document.createElement('span');
    el.className = 'particle';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const dur = 7 + Math.random() * 8;
    const del = Math.random() * 5;
    el.style.cssText = `left:${Math.random()*100}%;font-size:${14+Math.random()*16}px;animation-duration:${dur}s;animation-delay:${del}s;`;
    wrap.appendChild(el);
    setTimeout(() => el.remove(), (dur + del) * 1000);
  }

  for (let i = 0; i < 14; i++) spawn();
  setInterval(spawn, 900);
})();

/* ── CONFETTI ── */
function launchConfetti() {
  const colors = ['#ff4d8d','#ff9a3c','#38d9ff','#fff350','#a78bfa','#34d399'];
  for (let i = 0; i < 90; i++) {
    setTimeout(() => {
      const el   = document.createElement('div');
      const size = 6 + Math.random() * 10;
      el.className = 'confetti-piece';
      el.style.cssText = `
        left:${Math.random()*100}vw;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        width:${size}px;height:${size}px;
        border-radius:${Math.random()>0.5?'50%':'2px'};
        animation-duration:${1.5+Math.random()*2.5}s;
        animation-delay:${Math.random()*1.2}s;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 5000);
    }, i * 20);
  }
}

render();
</script>
</body>
</html>
